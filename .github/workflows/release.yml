name: Build & Publish Windows EXE Release

# Triggers: pushing a `v*.*.*` tag (e.g. `git tag v1.0.0 && git push --tags`)
# OR manual run from the Actions tab via the workflow_dispatch button.
#
# Why this workflow exists
# ========================
# `build_exe.py` lives in the repo and produces a single-file EXE plus a
# Desktop shortcut, but it can only run on Windows (PyInstaller --onefile
# emits a Windows binary; `winshell` and `pywin32` are Windows-only). To
# keep release-cutting one-step we run the build on a `windows-latest`
# GitHub-hosted runner whenever a version tag is pushed, then attach the
# resulting `AegisOptimizer.exe` to a GitHub Release named after the tag.
#
# The `verify.yml` and `deploy.yml` workflows are intentionally NOT
# touched: they run on every push to `main`, while this workflow runs
# only on tags. Operators tag a vetted commit, this workflow ships the
# binary, and the existing test/deploy gates continue to protect main.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (must already exist or will be created)'
        required: true
        default: 'v0.0.0-manual'

permissions:
  # Required for the `softprops/action-gh-release` step to create / update
  # the Release object on the repository. Read perms cover the checkout
  # step's clone of the source tree.
  contents: write

jobs:
  build-exe:
    name: Build AegisOptimizer.exe (Windows)
    runs-on: windows-latest

    steps:
      - name: Check out the tagged commit
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        shell: pwsh

      - name: Build the EXE
        # `build_exe.py` calls PyInstaller --onefile and then attempts to
        # create a Desktop shortcut. The shortcut step is non-fatal in
        # the script (it logs and exits 0 if winshell/pywin32 are
        # missing or the Desktop folder cannot be resolved), which is
        # the right behavior for a CI runner that has no real desktop.
        run: python build_exe.py
        shell: pwsh

      - name: Verify the artifact exists
        # Fail loudly if PyInstaller silently produced a zero-byte file
        # or if the build was redirected to dist/AegisOptimizer/ instead
        # of the single-file dist/AegisOptimizer.exe layout.
        run: |
          if (-not (Test-Path "dist/AegisOptimizer.exe")) {
            Write-Error "::error::Expected dist/AegisOptimizer.exe was not produced by build_exe.py"
            exit 1
          }
          $size = (Get-Item "dist/AegisOptimizer.exe").Length
          if ($size -lt 1MB) {
            Write-Error "::error::AegisOptimizer.exe is suspiciously small ($size bytes); aborting release."
            exit 1
          }
          Write-Host "Built artifact: dist/AegisOptimizer.exe ($([math]::Round($size/1MB, 2)) MB)"
        shell: pwsh

      - name: Upload EXE as workflow artifact
        # This makes the binary downloadable from the Actions run UI in
        # addition to attaching it to the Release. Useful for debugging
        # a failed `softprops/action-gh-release` step without re-running
        # the whole build.
        uses: actions/upload-artifact@v4
        with:
          name: AegisOptimizer-${{ github.ref_name }}
          path: dist/AegisOptimizer.exe
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release with EXE attached
        # `softprops/action-gh-release` is the de-facto standard action
        # for this. It creates the Release if it does not exist, or
        # updates it (re-uploading the asset) if it does. The release
        # name and tag both follow the pushed tag.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/AegisOptimizer.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

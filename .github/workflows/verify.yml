name: Aegis CI/CD Verification

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-validation:
    name: Build Validation (Windows)
    runs-on: windows-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      shell: pwsh

    - name: Validate PyInstaller Build
      run: |
        python build_exe.py
      shell: pwsh

    - name: Verify Executable Built
      run: |
        if (-not (Test-Path "dist/AegisOptimizer.exe")) {
          Write-Error "AegisOptimizer.exe was not produced"
          exit 1
        }
      shell: pwsh

